name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      image_release_created: >-
        ${{ steps.release.outputs['packages/nib-images--release_created'] }}
      image_tag_name: >-
        ${{ steps.release.outputs['packages/nib-images--tag_name'] }}
      # Image-only changes do not create the root tag. Fall back to the image
      # tag so the publish job always checks out the release commit.
      release_ref: >-
        ${{ steps.release.outputs.tag_name ||
        steps.release.outputs['packages/nib-images--tag_name'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released version
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.release_ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce pre-major version policy
        run: bun run check:version-policy

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Set up Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm for trusted publishing
        run: npm install --global npm@11.5.1

      - name: Publish to npm with provenance
        if: needs.release-please.outputs.release_created == 'true'
        run: npm publish --provenance --access public

      - name: Publish @briansunter/nib-images to npm with provenance
        if: needs.release-please.outputs.image_release_created == 'true'
        working-directory: packages/nib-images
        run: npm publish --provenance --access public
